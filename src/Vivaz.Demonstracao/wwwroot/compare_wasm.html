<!doctype html>
<html>
<head><meta charset="utf-8"><title>Compare via WASM</title></head>
<body>
<h1>Compare (WASM)</h1>
<video id="video" autoplay playsinline width="320" height="240"></video>
<canvas id="canvas" style="display:none"></canvas>
<button id="capA">Capture A</button>
<button id="capB">Capture B</button>
<button id="compare">Compare (WASM)</button>
<div>A: <img id="imgA" width="160"></div>
<div>B: <img id="imgB" width="160"></div>
<div id="result"></div>
<script src="/js/compare.js"></script>
<script>
  // configure for WASM-backed endpoints
  window.demoCompareConfig = {
    embedEndpoint: '/api/face/wasm/embed',
    compareEndpoint: '/api/face/wasm/compare',
    thresholdPercent: 70
  };
</script>
</body>
</html>
