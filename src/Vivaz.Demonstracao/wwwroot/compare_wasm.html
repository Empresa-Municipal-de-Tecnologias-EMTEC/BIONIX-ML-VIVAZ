<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Comparação — WASM (cliente)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .video-container { position: relative; border-radius: 8px; overflow: hidden; background: #000; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #video { width: 100%; height: auto; display: block; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .log-container { height: 150px; overflow-y: auto; background: #212529; color: #0dcaf0; font-family: monospace; font-size: 0.8rem; padding: 10px; border-radius: 4px; }
        .card { border: none; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container py-4">
        <header class="pb-3 mb-4 border-bottom d-flex justify-content-between align-items-center">
            <h1 class="h3 text-dark mb-0">Vivaz Face Intelligence — WASM Cliente</h1>
            <div id="status-badge"><span class="badge bg-secondary">Inicializando...</span></div>
        </header>
        
        <div class="row g-4">
            <div class="col-md-7">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <div class="video-container mb-3">
                            <video id="video" autoplay playsinline></video>
                            <canvas id="overlay"></canvas>
                        </div>
                        <div class="d-flex gap-2">
                            <button id="capA" class="btn btn-primary">Capturar A</button>
                            <button id="capB" class="btn btn-primary">Capturar B</button>
                            <button id="downloadBmp" class="btn btn-secondary">Baixar Crop BMP</button>
                            <button id="compare" class="btn btn-success">Comparar (WASM)</button>
                            <button id="startDetect" class="btn btn-outline-secondary">Parar Detecção</button>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-5">
                <div class="card shadow-sm mb-3">
                    <div class="card-body">
                        <h5 class="card-title mb-3">Resultados</h5>
                        <div class="d-flex gap-2 mb-3">
                            <div class="text-center flex-grow-1">
                                <small class="d-block text-muted mb-1">Face A</small>
                                <img id="imgA" class="img-thumbnail" style="width:120px; height:120px; object-fit: cover; background: #eee;">
                            </div>
                            <div class="text-center flex-grow-1">
                                <small class="d-block text-muted mb-1">Face B</small>
                                <img id="imgB" class="img-thumbnail" style="width:120px; height:120px; object-fit: cover; background: #eee;">
                            </div>
                        </div>
                        <div id="result" class="alert alert-light border text-center">Aguardando capturas...</div>
                    </div>
                </div>
                
                <div class="card shadow-sm">
                    <div class="card-header bg-white py-2">Logs do Sistema</div>
                    <div class="card-body p-2">
                        <div id="logs" class="log-container"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <canvas id="canvas" style="display:none"></canvas>

    <script>
        window.demoCompareConfig = {
            allowServerFallback: false,
            thresholdPercent: 70,
            embedEndpoint: '/api/face/wasm/embed',
            compareEndpoint: '/api/face/wasm/compare'
        };

        function pageLog(msg) {
            const logs = document.getElementById('logs');
            const entry = document.createElement('div');
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logs.appendChild(entry);
            logs.scrollTop = logs.scrollHeight;
            
            if (msg.includes("carregado com sucesso")) {
                document.getElementById('status-badge').innerHTML = '<span class="badge bg-success">WASM Ativo</span>';
            }
        }
        
        const oldLog = console.log;
        console.log = function(...args) {
            oldLog(...args);
            if (typeof args[0] === 'string' && args[0].includes('[vivaz]')) pageLog(args[0]);
        };
    </script>
    
    <!-- Loader único unificado que resolve o erro "Runtime module already loaded" -->
    <script src="/vivaz.js"></script>
    <!-- Script de lógica da página -->
    <script src="/js/compare.js"></script>
</body>
</html>
