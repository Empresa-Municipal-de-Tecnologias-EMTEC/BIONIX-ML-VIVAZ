<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bionix – Vivaz</title>
  <style>
    :root { --bg:#0d1117; --surface:#161b22; --border:#30363d;
            --accent:#58a6ff; --ok:#3fb950; --warn:#f0883e; --danger:#f85149; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:#e6edf3; font-family:'Segoe UI',system-ui,sans-serif;
           display:flex; flex-direction:column; align-items:center; min-height:100vh;
           padding:24px 16px; }
    h1 { font-size:1.5rem; color:var(--accent); margin-bottom:4px; }
    .sub { color:#8b949e; font-size:.85rem; margin-bottom:24px; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:12px;
            padding:20px; width:100%; max-width:560px; margin-bottom:16px; }
    .card h2 { font-size:.9rem; color:#8b949e; text-transform:uppercase;
               letter-spacing:.06em; margin-bottom:12px; }
    video { border-radius:8px; background:#000; display:block; width:100%; }
    canvas { border-radius:8px; display:block; }
    #cap { display:none; }
    .row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
    button { background:var(--accent); color:#0d1117; border:none; border-radius:6px;
             padding:8px 18px; font-size:.9rem; font-weight:600; cursor:pointer; }
    button:disabled { opacity:.4; cursor:not-allowed; }
    button.secondary { background:transparent; color:var(--accent); border:1px solid var(--accent); }
    .status { font-size:.85rem; padding:6px 10px; border-radius:6px;
              background:rgba(88,166,255,.1); color:var(--accent); flex:1; }
    .status.ok     { background:rgba(63,185,80,.1);  color:var(--ok); }
    .status.warn   { background:rgba(240,136,62,.1); color:var(--warn); }
    .status.danger { background:rgba(248,81,73,.1);  color:var(--danger); }
    .result { font-size:1.2rem; font-weight:700; color:var(--ok); text-align:center;
              padding:12px; border-radius:8px; background:rgba(63,185,80,.08); margin-top:10px; }
    .result .score { font-size:.85rem; color:#8b949e; font-weight:400; }
    #progress { width:100%; height:4px; background:var(--border); border-radius:2px; margin-top:8px; }
    #progress-bar { height:100%; background:var(--accent); border-radius:2px;
                    width:0%; transition:width .3s; }
    .log { font-size:.75rem; color:#6e7681; font-family:monospace; max-height:80px;
           overflow-y:auto; margin-top:10px; }
    .overlay-canvas { position:absolute; top:0; left:0; width:100%; height:100%;
                       border-radius:8px; background:transparent;
                       pointer-events:none; }
    .video-wrap { position:relative; width:100%; }
    #face-indicator { display:none; margin-top:10px; padding:8px 14px; border-radius:8px;
                      font-size:.9rem; font-weight:600; text-align:center;
                      transition:background .3s,color .3s; }
    #face-indicator.detected { display:block; background:rgba(63,185,80,.15);
                               color:var(--ok); border:1px solid rgba(63,185,80,.3); }
    #face-indicator.lost     { display:block; background:rgba(248,81,73,.1);
                               color:var(--danger); border:1px solid rgba(248,81,73,.2); }
    .cap-thumb { width:80px; height:80px; border:2px solid var(--border); border-radius:6px; background:#111; }
    .cap-slot  { text-align:center; }
    .cap-label { font-size:.75rem; color:#8b949e; margin-top:4px; }
    .vs-sep    { font-size:1.2rem; color:#6e7681; align-self:center; padding:0 6px; }
  </style>
</head>
<body>
  <h1>Bionix Vivaz</h1>
  <p class="sub">Detecção e reconhecimento facial em tempo real</p>

  <!-- Status de carregamento -->
  <div class="card">
    <h2>Inicialização</h2>
    <div id="status" class="status">Aguardando...</div>
    <div id="progress"><div id="progress-bar"></div></div>
    <div id="log" class="log"></div>
  </div>

  <!-- Câmera -->
  <div class="card">
    <h2>Camera</h2>
    <div class="video-wrap">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="overlay" class="overlay-canvas"></canvas>
    </div>
    <canvas id="cap" width="64" height="64"></canvas>
    <div class="row" style="margin-top:12px">
      <button id="btn-cam" onclick="startCamera()">Abrir Câmera</button>
      <button id="btn-id"  onclick="identify()" disabled>Identificar galeria</button>
      <button id="btn-live" class="secondary" onclick="toggleLive()" disabled>Live OFF</button>
      <button id="btn-capture" onclick="captureStep()" disabled>📷 Capturar A</button>
    </div>
    <!-- Comparação A vs B por câmera -->
    <div id="cap-row" class="row" style="display:none; margin-top:14px; align-items:flex-start; flex-wrap:nowrap;">
      <div class="cap-slot">
        <canvas id="thumb-a" width="80" height="80" class="cap-thumb"></canvas>
        <div class="cap-label" id="lbl-a">A — vazio</div>
      </div>
      <div class="vs-sep">vs</div>
      <div class="cap-slot">
        <canvas id="thumb-b" width="80" height="80" class="cap-thumb"></canvas>
        <div class="cap-label" id="lbl-b">B — vazio</div>
      </div>
      <div id="cap-sim" style="flex:1; font-size:.85rem; padding-left:10px; align-self:center; line-height:1.6;"></div>
      <button class="secondary" onclick="clearCaptures()" style="padding:6px 10px; align-self:center; margin-left:auto;">🔄</button>
    </div>
    <div id="face-indicator"></div>
  </div>

  <!-- Resultado — identificação galeria -->
  <div class="card">
    <h2>Resultado — Galeria</h2>
    <div id="result" class="result" style="display:none"></div>
    <div id="placeholder" style="color:#6e7681; font-size:.85rem">Clique em "Identificar galeria" para verificar na galeria treinada.</div>
  </div>

  <script>
    /* ── Config ─────────────────────────────────────────────────────────────── */
    const WASM_JS      = 'arcface.js';
    const BUNDLE_BIN   = 'arcface_bundle.bin';
    const GALLERY_BIN  = 'arcface_gallery.bin';
    const THRESHOLD         = 0.55;
    const PRESENCE_THRESHOLD = 0.20;   // score mínimo para considerar rosto presente
    const LIVE_INTERVAL_MS   = 800;

    /* ── Estado ─────────────────────────────────────────────────────────────── */
    let Module = null, wasmReady = false;
    let liveTimer = null, liveOn = false;
    let facePresent = false;
    let captureA_emb = null, captureB_emb = null, captureState = 0;
    let liveAnimFrame = null, livePulse = 0;
    let faceBox = null;        // {x, y, width, height} em coords do vídeo
    let faceDetector = null;   // FaceDetector API (Chrome/Edge)
    const video = document.getElementById('video');
    const cap   = document.getElementById('cap');
    const capCtx = cap.getContext('2d');
    const overlay = document.getElementById('overlay');
    const ovCtx  = overlay.getContext('2d');

    function log(msg) {
      const el = document.getElementById('log');
      el.innerHTML += msg + '<br>';
      el.scrollTop = el.scrollHeight;
      console.log('[Bionix]', msg);
    }
    function setStatus(msg, cls='') {
      const el = document.getElementById('status');
      el.textContent = msg; el.className = 'status ' + cls;
    }
    function setProgress(pct) {
      document.getElementById('progress-bar').style.width = pct + '%';
    }

    /* ── Carrega WASM + pesos ────────────────────────────────────────────────── */
    async function init() {
      setStatus('Carregando módulo WASM...'); setProgress(10);
      try {
        await new Promise((res, rej) => {
          const s = document.createElement('script');
          s.src = WASM_JS;
          s.onload = () => {
            BionixModule().then(m => { Module = m; res(); }).catch(rej);
          };
          s.onerror = rej;
          document.head.appendChild(s);
        });
        log('✓ WASM carregado');
        setProgress(30);
      } catch(e) {
        setStatus('Erro ao carregar WASM: ' + e, 'danger');
        return;
      }

      // Carrega bundle de pesos
      setStatus('Carregando pesos do modelo...'); setProgress(40);
      try {
        const r = await fetch(BUNDLE_BIN);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const buf  = await r.arrayBuffer();
        const data = new Uint8Array(buf);
        const ptr  = Module._bionix_malloc(data.length);
        Module.HEAPU8.set(data, ptr);
        const ok = Module._bionix_load_bundle(ptr, data.length);
        Module._bionix_free(ptr);
        if (!ok) throw new Error('bundle inválido');
        log('✓ Pesos carregados (' + (data.length / 1024).toFixed(0) + ' KB)');
        setProgress(70);
      } catch(e) {
        setStatus('Erro ao carregar pesos: ' + e, 'danger');
        log('→ Execute: pixi run build_wasm_bundle');
        return;
      }

      // Carrega galeria
      setStatus('Carregando galeria...'); setProgress(80);
      try {
        const r = await fetch(GALLERY_BIN);
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const buf  = await r.arrayBuffer();
        const data = new Uint8Array(buf);
        const ptr  = Module._bionix_malloc(data.length);
        Module.HEAPU8.set(data, ptr);
        const n = Module._bionix_load_gallery(ptr, data.length);
        Module._bionix_free(ptr);
        log('✓ Galeria: ' + n + ' identidades');
        setProgress(100);
      } catch(e) {
        log('⚠ Galeria não encontrada — identificação desabilitada');
      }

      wasmReady = true;
      setStatus('Pronto!', 'ok');
      // Tenta inicializar o detector de rosto nativo do browser
      if ('FaceDetector' in window) {
        try { faceDetector = new FaceDetector({ fastMode: true, maxDetectedFaces: 1 }); log('✓ FaceDetector disponível'); }
        catch(e) { log('⚠ FaceDetector indisponível: ' + e); }
      } else {
        log('⚠ FaceDetector não suportado neste browser');
      }
      // enable camera buttons if camera is already open
      if (video.srcObject) {
        document.getElementById('btn-id').disabled      = false;
        document.getElementById('btn-capture').disabled = false;
      }
    }

    /* ── Câmera ─────────────────────────────────────────────────────────────── */
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode:'user' } });
        video.srcObject = stream;
        video.onloadedmetadata = () => {
          overlay.width  = video.videoWidth  || 640;
          overlay.height = video.videoHeight || 480;
        };
        video.addEventListener('playing', () => {
          overlay.width  = video.videoWidth  || overlay.width  || 640;
          overlay.height = video.videoHeight || overlay.height || 480;
        });
        document.getElementById('btn-cam').disabled  = true;
        document.getElementById('btn-live').disabled = false;  // permite ver câmera mesmo sem WASM
        document.getElementById('btn-id').disabled      = !wasmReady;
        document.getElementById('btn-capture').disabled = !wasmReady;
        log('✓ Câmera aberta');
        if (!wasmReady) log('⚠ WASM ainda carregando — inicie com: python -m http.server 9000');
      } catch(e) {
        setStatus('Câmera indisponível: ' + e.message, 'warn');
      }
    }

    /* ── Captura frame 64×64 ────────────────────────────────────────────────── */
    function captureRGBA() {
      capCtx.drawImage(video, 0, 0, 64, 64);
      return capCtx.getImageData(0, 0, 64, 64).data; // Uint8ClampedArray RGBA
    }

    /* ── Identificação ──────────────────────────────────────────────────────── */
    function identify() {
      if (!Module) {
        if (!wasmReady) drawStaticBox(false);
        return;
      }
      const rgba = captureRGBA();
      const ptr  = Module._bionix_malloc(rgba.length);
      Module.HEAPU8.set(rgba, ptr);

      // Aloca float para score de saída
      const scorePtr = Module._bionix_malloc(4);
      const idx = Module._bionix_identify_rgba(ptr, 64, 64, THRESHOLD, scorePtr);
      const score = Module.HEAPF32[scorePtr >> 2];
      Module._bionix_free(ptr);
      Module._bionix_free(scorePtr);

      showResult(idx, score);
      if (!liveOn) drawStaticBox(idx >= 0);
      _updateFacePresence(idx, score);
      // Detecta posição do rosto para animação live
      if (liveOn && faceDetector && video.readyState >= 2) {
        faceDetector.detect(video).then(faces => {
          if (faces.length > 0) {
            const b = faces[0].boundingBox;
            faceBox = { x: b.x, y: b.y, width: b.width, height: b.height };
          } else {
            faceBox = null;
          }
        }).catch(() => { faceBox = null; });
      }
    }

    function _updateFacePresence(idx, score) {
      const hasFace = score >= PRESENCE_THRESHOLD;
      const indicator = document.getElementById('face-indicator');
      if (hasFace !== facePresent) {
        facePresent = hasFace;
        if (hasFace) {
          const name = (idx >= 0 && Module)
            ? Module.UTF8ToString(Module._bionix_get_name(idx))
            : 'desconhecido';
          indicator.className = 'detected';
          indicator.textContent = '👤 Rosto detectado: ' + name +
            ' (' + score.toFixed(3) + ')';
          const ev = new CustomEvent('bionix:face-detected',
            { bubbles:true, detail:{ name, score, idx } });
          document.dispatchEvent(ev);
          if (typeof window.onBionixFaceDetected === 'function')
            window.onBionixFaceDetected(ev.detail);
        } else {
          indicator.className = 'lost';
          indicator.textContent = '🚫 Nenhum rosto detectado';
          const ev = new CustomEvent('bionix:face-lost', { bubbles:true, detail:{} });
          document.dispatchEvent(ev);
          if (typeof window.onBionixFaceLost === 'function')
            window.onBionixFaceLost();
        }
      } else if (hasFace) {
        // Atualiza nome mesmo sem mudança de estado
        const name = (idx >= 0 && Module)
          ? Module.UTF8ToString(Module._bionix_get_name(idx))
          : 'desconhecido';
        indicator.textContent = '👤 Rosto detectado: ' + name +
          ' (' + score.toFixed(3) + ')';
      }
    }

    function showResult(idx, score) {
      const r = document.getElementById('result');
      const p = document.getElementById('placeholder');
      p.style.display = 'none';
      r.style.display = 'block';
      if (idx < 0) {
        r.style.color = 'var(--danger)';
        r.innerHTML = '🚫 Desconhecido <span class="score">(score: ' + score.toFixed(3) + ')</span>';
      } else {
        const name = Module.UTF8ToString(Module._bionix_get_name(idx));
        r.style.color = 'var(--ok)';
        r.innerHTML = '✅ ' + name + '<span class="score"> (score: ' + score.toFixed(3) + ')</span>';
      }
    }

    function _drawCorners(color, x, y, w, h) {
      const L = Math.min(w, h) * 0.18;
      ovCtx.strokeStyle = color;
      ovCtx.lineWidth = 3;
      ovCtx.lineCap = 'square';
      const segs = [
        [x,     y+L,   x,   y,   x+L,   y    ],
        [x+w-L, y,     x+w, y,   x+w,   y+L  ],
        [x,     y+h-L, x,   y+h, x+L,   y+h  ],
        [x+w-L, y+h,   x+w, y+h, x+w,   y+h-L]
      ];
      for (const [x1,y1,cx,cy,x2,y2] of segs) {
        ovCtx.beginPath(); ovCtx.moveTo(x1,y1); ovCtx.lineTo(cx,cy); ovCtx.lineTo(x2,y2);
        ovCtx.stroke();
      }
    }

    function drawStaticBox(found) {
      ovCtx.clearRect(0, 0, overlay.width, overlay.height);
      const m = 0.15;
      _drawCorners(
        found ? '#3fb950' : '#f85149',
        overlay.width * m, overlay.height * m,
        overlay.width * (1-2*m), overlay.height * (1-2*m)
      );
    }

    /* ── Modo live ──────────────────────────────────────────────────────────── */
    function toggleLive() {
      const btn = document.getElementById('btn-live');
      if (liveOn) {
        clearInterval(liveTimer); liveOn = false;
        btn.textContent = 'Live OFF'; btn.classList.remove('secondary');
        if (liveAnimFrame) { cancelAnimationFrame(liveAnimFrame); liveAnimFrame = null; }
        ovCtx.clearRect(0, 0, overlay.width, overlay.height);
      } else {
        liveOn = true;
        btn.textContent = 'Live ON'; btn.classList.add('secondary');
        liveTimer = setInterval(identify, LIVE_INTERVAL_MS);
        liveLoop();
      }
    }

    /* ── Animação overlay live (requestAnimationFrame 60 fps) ──────────── */
    function liveLoop() {
      if (!liveOn) { liveAnimFrame = null; return; }
      liveAnimFrame = requestAnimationFrame(liveLoop);
      // keep overlay coordinate space in sync with video
      if (video.videoWidth > 0 && (overlay.width !== video.videoWidth || overlay.height !== video.videoHeight)) {
        overlay.width  = video.videoWidth;
        overlay.height = video.videoHeight;
      }
      livePulse = (livePulse + 3) % 360;
      const a = (0.55 + 0.45 * Math.sin(livePulse * Math.PI / 180)).toFixed(2);
      ovCtx.clearRect(0, 0, overlay.width, overlay.height);
      const color = facePresent ? `rgba(63,185,80,${a})` : `rgba(88,166,255,${a})`;
      if (faceBox && overlay.width > 0) {
        // Converte coords do vídeo para coords do overlay (podem diferir se CSS escalou)
        const scaleX = overlay.width  / (video.videoWidth  || overlay.width);
        const scaleY = overlay.height / (video.videoHeight || overlay.height);
        const pad = 10;
        _drawCorners(color,
          faceBox.x * scaleX - pad,
          faceBox.y * scaleY - pad,
          faceBox.width  * scaleX + pad * 2,
          faceBox.height * scaleY + pad * 2);
      } else {
        const m = 0.15;
        _drawCorners(color, overlay.width*m, overlay.height*m,
                     overlay.width*(1-2*m), overlay.height*(1-2*m));
      }
    }

    /* ── Captura A / B e comparação por câmera ──────────────────────────── */
    function _computeEmb(rgba) {
      const E   = Module._bionix_embed_dim();
      const ptr = Module._bionix_malloc(rgba.length);
      const ep  = Module._bionix_malloc(E * 4);
      Module.HEAPU8.set(rgba, ptr);
      Module._bionix_embed_rgba(ptr, 64, 64, ep);
      Module._bionix_free(ptr);
      const emb = new Float32Array(Module.HEAPF32.buffer, ep, E).slice();
      Module._bionix_free(ep);
      return emb;
    }

    function _drawThumb(canvasId, rgba) {
      const off = document.createElement('canvas');
      off.width = 64; off.height = 64;
      off.getContext('2d').putImageData(new ImageData(new Uint8ClampedArray(rgba), 64, 64), 0, 0);
      const c = document.getElementById(canvasId);
      c.getContext('2d').drawImage(off, 0, 0, 80, 80);
    }

    function _embSim(a, b) {
      let dot=0, na=0, nb=0;
      for (let i=0; i<a.length; i++) { dot+=a[i]*b[i]; na+=a[i]*a[i]; nb+=b[i]*b[i]; }
      return (na>0 && nb>0) ? dot / (Math.sqrt(na) * Math.sqrt(nb)) : 0;
    }

    function captureStep() {
      if (!wasmReady || !Module || !video.srcObject) return;
      const rgba = captureRGBA();
      if (captureState === 0) {
        captureA_emb = _computeEmb(rgba);
        _drawThumb('thumb-a', rgba);
        document.getElementById('lbl-a').textContent = 'A — capturado';
        document.getElementById('cap-sim').innerHTML  = '';
        document.getElementById('cap-row').style.display = 'flex';
        document.getElementById('btn-capture').textContent = '📷 Capturar B';
        captureState = 1;
      } else {
        captureB_emb = _computeEmb(rgba);
        _drawThumb('thumb-b', rgba);
        document.getElementById('lbl-b').textContent = 'B — capturado';
        const sim   = _embSim(captureA_emb, captureB_emb);
        const mesma = sim >= THRESHOLD;
        document.getElementById('cap-sim').innerHTML =
          (mesma ? '<span style="color:var(--ok)">✅ Mesma pessoa</span>'
                 : '<span style="color:var(--danger)">❌ Pessoas diferentes</span>') +
          '<br><span style="font-size:.8rem;color:#8b949e">sim: ' + sim.toFixed(4) + '</span>';
        document.getElementById('btn-capture').textContent = '📷 Capturar A';
        captureState = 0;
      }
    }

    function clearCaptures() {
      captureA_emb = captureB_emb = null; captureState = 0;
      document.getElementById('cap-row').style.display = 'none';
      document.getElementById('btn-capture').textContent = '📷 Capturar A';
      document.getElementById('cap-sim').innerHTML = '';
      ['thumb-a','thumb-b'].forEach(id => {
        document.getElementById(id).getContext('2d').clearRect(0, 0, 80, 80);
      });
      document.getElementById('lbl-a').textContent = 'A — vazio';
      document.getElementById('lbl-b').textContent = 'B — vazio';
    }

    /* ── Bootstrap ──────────────────────────────────────────────────────────── */
    window.addEventListener('load', init);
  </script>
</body>
</html>
